<div class="sidebar">
  <div class="container sidebar-sticky">
    <div class="sidebar-about">
      <img src="{{ site.baseurl }}/assets/HangQ.jpg" alt="Hang Qiu" class="centeravatar">
      <h1>
        <a href="{{ site.baseurl }}/">
          {{ site.title }}
        </a>
      </h1>
    </div>

    <div class="social-icons">
      <div class="social-icons-right">
        <div class="right">
          <a class="ai ai-google-scholar" href="https://scholar.google.com/citations?user=9i_MgykAAAAJ&hl=en" aria-label="Google Scholar"></a>
          <a class="fab fa-github" href="https://github.com/hangqiu" aria-label="GitHub"></a>
          <a class="fab fa-twitter" href="https://twitter.com/hangqiu" aria-label="Twitter"></a>
          <a class="fab fa-facebook" href="https://facebook.com/hang.qiu.1" aria-label="Facebook"></a>
          <a class="fab fa-linkedin" href="https://www.linkedin.com/in/hang-qiu-a523128a" aria-label="LinkedIn"></a>
          <a class="fas fa-envelope" href="mailto:hangq@ucr.edu" aria-label="Email"></a>
        </div>
      </div>
    </div>

    <div></div>
    <nav class="sidebar-nav">
      <a class="sidebar-nav-item{% if page.url == site.baseurl %} active{% endif %}" href="{{ site.baseurl }}/">Home</a>

      <a class="sidebar-nav-item" href="https://cisl.ucr.edu/">Lab</a>
      <a class="sidebar-nav-item" href="https://cisl.ucr.edu/publication/">Publication</a>
      <a class="sidebar-nav-item" href="https://cisl.ucr.edu/research/">Research</a>
      <a class="sidebar-nav-item" href="https://cisl.ucr.edu/teaching/">Teaching</a>
      {% assign pages_list = site.pages %}
      {% for node in pages_list %}
        {% if node.title != null %}
          {% if node.layout == "page" %}
            <a class="sidebar-nav-item{% if page.url == node.url %} active{% endif %}" href="{{ site.baseurl }}{{ node.url }}">{{ node.title }}</a>
          {% endif %}
        {% endif %}
      {% endfor %}
      <a class="sidebar-nav-item" href="{{ site.baseurl }}/assets/Hang_Qiu_CV.pdf">CV</a>
    </nav>
  </div>

</div>
